<style>
:root{
  --azure-blue:#0078d4;
  --navy:#001424;
  --white:#fff;
  --off:#faf9f8;
  --border:#e1dfdd;
  --text:#201f1e;
  --muted:#605e5c;
  --font:'Segoe UI','Segoe UI Web',system-ui,-apple-system,sans-serif;
  --r2:2px;
  --sh2:0 3.2px 7.2px 0 rgba(0,0,0,.132),0 0.6px 1.8px 0 rgba(0,0,0,.108);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);
  background:linear-gradient(135deg,#0078d4 0%,#005a9e 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-container{
  background:var(--white);
  border-radius:var(--r2);
  box-shadow:var(--sh2);
  width:100%;
  max-width:440px;
  padding:48px 40px;
}
.logo-container{
  text-align:center;
  margin-bottom:32px;
}
.logo-mark{
  width:48px;
  height:48px;
  background:linear-gradient(135deg,var(--navy),#003666);
  border-radius:8px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:20px;
  font-weight:900;
  margin-bottom:16px;
}
.logo-title{
  font-size:24px;
  font-weight:600;
  color:var(--text);
  margin-bottom:4px;
}
.logo-subtitle{
  font-size:14px;
  color:var(--muted);
}
.welcome{
  text-align:center;
  margin-bottom:32px;
}
.welcome h2{
  font-size:20px;
  font-weight:600;
  color:var(--text);
  margin-bottom:8px;
}
.welcome p{
  font-size:14px;
  color:var(--muted);
}
.auth-buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:24px;
}
.auth-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:12px 20px;
  border-radius:var(--r2);
  border:1px solid var(--border);
  background:var(--white);
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  text-decoration:none;
}
.auth-btn:hover{
  background:var(--off);
  border-color:var(--azure-blue);
}
.auth-btn svg{
  width:20px;
  height:20px;
  flex-shrink:0;
}
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:24px 0;
  color:var(--muted);
  font-size:13px;
}
.divider::before,
.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}
.register-section{
  text-align:center;
  padding-top:24px;
  border-top:1px solid var(--border);
}
.register-section p{
  font-size:14px;
  color:var(--muted);
  margin-bottom:12px;
}
.register-btn{
  display:inline-block;
  padding:10px 24px;
  background:var(--azure-blue);
  color:var(--white);
  border-radius:var(--r2);
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  transition:all .15s;
}
.register-btn:hover{
  background:#005a9e;
}
.back-link{
  text-align:center;
  margin-top:24px;
}
.back-link a{
  font-size:13px;
  color:var(--azure-blue);
  text-decoration:none;
}
.back-link a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo-container">
    <div class="logo-mark">AI</div>
    <div class="logo-title">AI 360</div>
    <div class="logo-subtitle">Your Complete AI Learning Hub</div>
  </div>

  <div class="welcome">
    <h2>Welcome back</h2>
    <p>Sign in to access your personalized learning experience</p>
  </div>

  <div class="auth-buttons">
    <!-- Google Account - Try Azure domain -->

  </div>

  <div class="divider">OR</div>

  <div class="register-section">
    <p>Don't have an account?</p>
    <a href="register.html" class="register-btn">Create Account</a>
  </div>

  <div class="back-link">
    <a href="./">← Back to home</a>

</div>

</body>
</html>
